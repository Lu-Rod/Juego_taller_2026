
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
#gr{
  font-family:'Press Start 2P',monospace;
  background:#0a0a1a;
  color:#00ff88;
  min-height:600px;
  padding:18px 16px;
  border:3px solid #00ff88;
  border-radius:4px;
  position:relative;
  overflow:hidden;
}
#gr::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.03) 2px,rgba(0,255,136,0.03) 4px);
  pointer-events:none;z-index:0;
}
.z{position:relative;z-index:1}
.title{font-size:13px;color:#00ff88;text-align:center;letter-spacing:2px;margin-bottom:4px;text-shadow:0 0 8px #00ff88}
.sub{font-size:9px;color:#0088ff;text-align:center;margin-bottom:14px}
.hud{display:flex;justify-content:space-between;font-size:10px;color:#ffcc00;margin-bottom:12px;border:1px solid #333;padding:8px 12px;background:#111}
.lives{font-size:16px;color:#ff3344;letter-spacing:6px;text-align:center;margin-bottom:10px}
.pbar{height:10px;background:#111;border:1px solid #444;margin-bottom:12px}
.pfill{height:100%;background:#00ff88;transition:width 0.3s}
.qbox{background:#111;border:2px solid #00ff88;padding:18px 14px;margin-bottom:16px}
.qcat{font-size:9px;color:#0088ff;margin-bottom:10px}
.qtxt{font-size:13px;color:#ffcc00;line-height:1.8}
.arena{
  display:flex;justify-content:space-around;align-items:flex-end;
  margin-bottom:10px;min-height:140px;
  border:2px solid #333;background:#0d0d20;padding:10px 6px 0;
}
.slot{display:flex;flex-direction:column;align-items:center;width:30%;gap:0}
.scientist{font-size:34px;line-height:1;margin-bottom:0;transition:transform 0.1s;filter:drop-shadow(0 0 8px #ffcc00)}
.scientist.hidden{visibility:hidden}
.scientist.jump{animation:jump 0.25s ease-out}
@keyframes jump{0%{transform:translateY(0)}50%{transform:translateY(-14px)}100%{transform:translateY(0)}}
.platform{
  width:100%;font-size:11px;color:#fff;
  background:#1a1a3a;border:2px solid #555;
  padding:12px 6px;text-align:center;line-height:1.6;
  margin-top:2px;min-height:64px;display:flex;align-items:center;justify-content:center;
}
.platform.active{border-color:#0088ff;color:#0088ff;background:#0088ff15}
.platform.correct{border-color:#00ff88!important;background:#00ff8822!important;color:#00ff88!important;animation:fl 0.3s 3}
.platform.wrong{border-color:#ff3344!important;background:#ff334422!important;color:#ff3344!important;animation:sh 0.3s}
@keyframes fl{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.hint{font-size:9px;color:#888;text-align:center;margin:8px 0 6px}
.fb{font-size:11px;text-align:center;min-height:30px;line-height:1.8;margin-bottom:6px}
.fb.ok{color:#00ff88}
.fb.err{color:#ff3344}
.exp{font-size:9px;color:#aaa;display:block;margin-top:6px}
.next-hint{font-size:9px;color:#ffcc00;text-align:center;animation:blink 0.8s infinite;margin-top:6px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.start-screen,.win,.gameover{text-align:center;padding:16px 0}
.big-emoji{font-size:56px;display:block;margin:8px auto}
.start-screen h2{font-size:16px;color:#00ff88;margin-bottom:12px;text-shadow:0 0 12px #00ff88}
.start-screen p{font-size:9px;color:#aaa;line-height:2.6;margin-bottom:18px}
.badge{display:inline-block;background:#0088ff22;border:1px solid #0088ff;color:#0088ff;font-size:8px;padding:4px 9px;margin:3px}
.gbtn{
  background:#00ff88;border:2px solid #00ff88;color:#000;
  font-family:'Press Start 2P',monospace;font-size:11px;
  padding:14px 28px;cursor:pointer;margin-top:8px;
}
.gbtn:hover{background:#fff}
.gbtn.yellow{background:#ffcc00;border-color:#ffcc00}
.win h2{font-size:15px;color:#ffcc00;margin-bottom:14px;text-shadow:0 0 10px #ffcc00}
.gameover h2{font-size:15px;color:#ff3344;margin-bottom:14px;text-shadow:0 0 10px #ff3344}
.final{font-size:11px;color:#ffcc00;margin-bottom:18px;line-height:2.4}
</style>

<div id="gr">
<div class="z">
  <div class="title">⚗ QUIMICA QUEST ⚗</div>
  <div class="sub">TALLER 2 · EDICION RETRO</div>
  <div class="hud">
    <span>PTS: <span id="score">0</span></span>
    <span>LVL: <span id="level">1</span></span>
    <span>COMBO: <span id="combo">x1</span></span>
  </div>
  <div id="sc" class="z"></div>
</div>
</div>

<script>
const Q=[
  {cat:"Tabla Periódica",q:"¿Símbolo del ORO?",opts:["Au","Or","Ag"],ans:0,exp:"Au del latín AURUM = oro"},
  {cat:"Tabla Periódica",q:"¿Electrones del OXÍGENO?",opts:["6","8","10"],ans:1,exp:"Número atómico del O = 8"},
  {cat:"Compuestos",q:"¿Qué compuesto es H₂O?",opts:["Sal","Agua","Ácido"],ans:1,exp:"H₂O = 2 hidrógenos + 1 oxígeno"},
  {cat:"Compuestos",q:"¿Fórmula de la SAL DE MESA?",opts:["KCl","NaCl","HCl"],ans:1,exp:"NaCl = Cloruro de sodio"},
  {cat:"Estados",q:"¿A qué °C hierve el agua?",opts:["80°","100°","120°"],ans:1,exp:"100°C a presión atmosférica normal"},
  {cat:"Tabla Periódica",q:"¿Qué elemento es Fe?",opts:["Flúor","Francio","Hierro"],ans:2,exp:"Fe del latín FERRUM = hierro"},
  {cat:"Compuestos",q:"CO₂ es el...",opts:["Metano","Ozono","Dióxido de carbono"],ans:2,exp:"C=carbono + O₂=dos oxígenos"},
  {cat:"Reacciones",q:"¿Reacción que da luz y calor?",opts:["Síntesis","Combustión","Descomposición"],ans:1,exp:"La combustión libera energía"},
  {cat:"Tabla Periódica",q:"Gas más abundante en el aire:",opts:["Oxígeno","Nitrógeno","Argón"],ans:1,exp:"N₂ = 78% de la atmósfera"},
  {cat:"Tabla Periódica",q:"¿Símbolo del SODIO?",opts:["So","Na","Sn"],ans:1,exp:"Na del latín NATRIUM"},
  {cat:"Estados",q:"Sólido → Gas directamente:",opts:["Fusión","Condensación","Sublimación"],ans:2,exp:"Sublimación: sin pasar por líquido"},
  {cat:"Tabla Periódica",q:"¿Cuántos elementos hay?",opts:["112","118","124"],ans:1,exp:"118 elementos confirmados"},
  {cat:"Reacciones",q:"Ácido + Base produce...",opts:["Gas+Metal","Sal+Agua","Solo sal"],ans:1,exp:"Neutralización → Sal + H₂O"},
  {cat:"Tabla Periódica",q:"¿Símbolo del POTASIO?",opts:["Po","Pt","K"],ans:2,exp:"K del latín KALIUM"},
  {cat:"Compuestos",q:"¿Fórmula del DIÓXIDO DE CARBONO?",opts:["CO","CO₂","C₂O"],ans:1,exp:"1 carbono + 2 oxígenos"},
];

let qs,cur,score,lives,combo,answered,total,pos;
const sc=document.getElementById('sc');
const scoreEl=document.getElementById('score');
const levelEl=document.getElementById('level');
const comboEl=document.getElementById('combo');

function shuffle(a){return[...a].sort(()=>Math.random()-0.5)}

function showStart(){
  sc.innerHTML=`<div class="start-screen">
    <span class="big-emoji">🧑‍🔬</span>
    <h2>QUIMICA QUEST</h2>
    <p>Mové al científico con ← →<br>y confirmá con ↑ o ENTER<br><br>
    <span class="badge">Tabla Periódica</span>
    <span class="badge">Compuestos</span>
    <span class="badge">Estados</span>
    <span class="badge">Reacciones</span><br><br>
    15 preguntas · 3 vidas · combo x</p>
    <button class="gbtn" onclick="startGame()">▶ INICIAR</button>
  </div>`;
}

function startGame(){
  qs=shuffle(Q);cur=0;score=0;lives=3;combo=1;answered=false;total=qs.length;pos=1;
  updateHUD();showQ();
}

function updateHUD(){
  scoreEl.textContent=score;
  levelEl.textContent=Math.floor(cur/5)+1;
  comboEl.textContent='x'+combo;
}

function showQ(){
  if(cur>=total){showWin();return;}
  answered=false;pos=1;
  const q=qs[cur];
  const pct=Math.round((cur/total)*100);
  sc.innerHTML=`
    <div class="lives">${'♥'.repeat(lives)}${'♡'.repeat(3-lives)}</div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    <div class="qbox">
      <div class="qcat">[${q.cat}] · ${cur+1}/${total}</div>
      <div class="qtxt">${q.q}</div>
    </div>
    <div class="arena" id="arena">
      ${q.opts.map((o,i)=>`
      <div class="slot" id="slot${i}">
        <div class="scientist${i===1?'':' hidden'}" id="mk${i}">🧑‍🔬</div>
        <div class="platform${i===1?' active':''}" id="pl${i}">${o}</div>
      </div>`).join('')}
    </div>
    <div class="hint">← → mover &nbsp;|&nbsp; ↑ / ENTER confirmar</div>
    <div class="fb" id="fb"></div>`;
}

function moveSci(newPos){
  if(answered)return;
  const old=pos; pos=newPos;
  document.getElementById('mk'+old).classList.add('hidden');
  document.getElementById('mk'+newPos).classList.remove('hidden');
  document.getElementById('pl'+old).classList.remove('active');
  document.getElementById('pl'+newPos).classList.add('active');
}

function confirm(){
  if(answered)return;
  answered=true;
  const q=qs[cur];
  const fb=document.getElementById('fb');
  const mk=document.getElementById('mk'+pos);
  mk.classList.add('jump');
  setTimeout(()=>mk.classList.remove('jump'),300);

  if(pos===q.ans){
    document.getElementById('pl'+pos).classList.add('correct');
    const pts=10*combo;
    score+=pts; combo=Math.min(combo+1,5);
    fb.className='fb ok';
    fb.innerHTML=`✓ CORRECTO! +${pts} PTS<span class="exp">${q.exp}</span>`;
  } else {
    document.getElementById('pl'+pos).classList.add('wrong');
    document.getElementById('pl'+q.ans).classList.add('correct');
    lives--; combo=1;
    fb.className='fb err';
    fb.innerHTML=`✗ INCORRECTO<span class="exp">${q.exp}</span>`;
    if(lives<=0){updateHUD();setTimeout(showGameOver,900);return;}
  }
  updateHUD();
  setTimeout(()=>{
    const h=document.createElement('div');
    h.className='next-hint';
    h.textContent='ENTER para continuar';
    fb.appendChild(h);
  },400);
}

document.addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','Enter'].includes(e.key))e.preventDefault();
  if(e.key==='ArrowLeft') moveSci(Math.max(0,pos-1));
  else if(e.key==='ArrowRight') moveSci(Math.min(2,pos+1));
  else if(e.key==='ArrowUp'||e.key==='Enter'){
    if(!answered) confirm();
    else{cur++;showQ();}
  }
});

function showGameOver(){
  sc.innerHTML=`<div class="gameover">
    <span class="big-emoji">💀</span>
    <h2>GAME OVER</h2>
    <div class="final">PUNTUACIÓN: ${score} PTS<br>PREGUNTAS: ${cur}/${total}</div>
    <button class="gbtn" onclick="startGame()">↺ REINTENTAR</button>
  </div>`;
}

function showWin(){
  let m='🥉';
  if(score>=120)m='🥇';
  else if(score>=80)m='🥈';
  sc.innerHTML=`<div class="win">
    <span class="big-emoji">${m}</span>
    <h2>¡COMPLETADO!</h2>
    <div class="final">PUNTUACIÓN: ${score} / 150 PTS<br>VIDAS: ${'♥'.repeat(lives)}</div>
    <button class="gbtn yellow" onclick="startGame()">↺ JUGAR DE NUEVO</button>
  </div>`;
}

showStart();
</script>
