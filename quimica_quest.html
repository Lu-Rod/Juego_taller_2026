<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quimica Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050510;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
#game-root{
  font-family:'Press Start 2P',monospace;
  background:#0a0a1a;
  color:#00ff88;
  width:100%;
  max-width:600px;
  min-height:520px;
  padding:16px;
  border:3px solid #00ff88;
  border-radius:4px;
  image-rendering:pixelated;
  position:relative;
  overflow:hidden;
}
#game-root::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.03) 2px,rgba(0,255,136,0.03) 4px);
  pointer-events:none;z-index:0;
}
.layer{position:relative;z-index:1}
h1{font-size:9px;color:#00ff88;text-align:center;letter-spacing:2px;margin-bottom:4px;text-shadow:0 0 8px #00ff88}
.subtitle{font-size:6px;color:#0088ff;text-align:center;margin-bottom:16px;letter-spacing:1px}
.score-bar{display:flex;justify-content:space-between;font-size:6px;color:#ffcc00;margin-bottom:14px;border:1px solid #333;padding:6px 8px;background:#111}
.screen{text-align:center}
.question-box{
  background:#111;border:2px solid #00ff88;padding:14px 10px;margin-bottom:14px;
  font-size:7px;line-height:1.8;color:#fff;
}
.question-text{font-size:8px;color:#ffcc00;margin-bottom:10px;line-height:1.6}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.opt-btn{
  background:#111;border:2px solid #0088ff;color:#0088ff;
  font-family:'Press Start 2P',monospace;font-size:6px;
  padding:10px 4px;cursor:pointer;transition:all 0.1s;
  line-height:1.5;
}
.opt-btn:hover{background:#0088ff;color:#000;transform:scale(1.03)}
.opt-btn.correct{background:#00ff88!important;border-color:#00ff88!important;color:#000!important;animation:flash 0.3s 3}
.opt-btn.wrong{background:#ff3344!important;border-color:#ff3344!important;color:#fff!important;animation:shake 0.3s}
@keyframes flash{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.feedback{font-size:7px;text-align:center;min-height:20px;margin-bottom:8px;line-height:1.6}
.feedback.ok{color:#00ff88}
.feedback.err{color:#ff3344}
.progress-bar{height:8px;background:#111;border:1px solid #333;margin-bottom:10px}
.progress-fill{height:100%;background:#00ff88;transition:width 0.3s}
.lives{font-size:8px;color:#ff3344;letter-spacing:4px;text-align:center;margin-bottom:8px}
.next-btn{
  background:#ffcc00;border:2px solid #ffcc00;color:#000;
  font-family:'Press Start 2P',monospace;font-size:7px;
  padding:10px 20px;cursor:pointer;display:none;margin:0 auto;
}
.next-btn:hover{background:#fff}
.next-btn.show{display:block}
.gameover{text-align:center;padding:20px 0}
.gameover h2{font-size:11px;color:#ff3344;margin-bottom:16px;text-shadow:0 0 10px #ff3344}
.gameover .final{font-size:8px;color:#ffcc00;margin-bottom:20px;line-height:2}
.gameover button,.start-screen button{
  background:#00ff88;border:2px solid #00ff88;color:#000;
  font-family:'Press Start 2P',monospace;font-size:8px;
  padding:12px 24px;cursor:pointer;margin-top:8px;
}
.gameover button:hover,.start-screen button:hover{background:#fff}
.start-screen{text-align:center;padding:20px 0}
.start-screen h2{font-size:13px;color:#00ff88;margin-bottom:8px;text-shadow:0 0 12px #00ff88}
.start-screen p{font-size:6px;color:#aaa;line-height:2.2;margin-bottom:20px}
.cat-badge{
  display:inline-block;background:#0088ff22;border:1px solid #0088ff;
  color:#0088ff;font-size:5px;padding:2px 6px;margin:2px;
}
.win{text-align:center;padding:20px 0}
.win h2{font-size:11px;color:#ffcc00;margin-bottom:16px;text-shadow:0 0 10px #ffcc00}
.pixel-char{font-size:32px;display:block;margin:10px auto;line-height:1}
</style>
</head>
<body>
<div id="game-root">
  <div class="layer">
    <h1>⚗ QUIMICA QUEST ⚗</h1>
    <div class="subtitle"></div>
    <div class="score-bar">
      <span>PTS: <span id="score">0</span></span>
      <span>LVL: <span id="level">1</span></span>
      <span>BONUS: <span id="combo">x1</span></span>
    </div>
    <div id="screen" class="screen"></div>
  </div>
</div>

<script>
const QUESTIONS = [
  {cat:"Tabla Periódica", q:"¿Cuál es el símbolo del ORO?",                          opts:["Au","Or","Go","Ag"],           ans:0, exp:"Au viene del latín AURUM = oro"},
  {cat:"Tabla Periódica", q:"¿Cuántos electrones tiene el OXÍGENO?",                  opts:["6","8","10","16"],             ans:1, exp:"Número atómico del O = 8"},
  {cat:"Compuestos",      q:"¿Qué compuesto es H₂O?",                                 opts:["Agua","Sal","Ácido","Glucosa"],ans:0, exp:"H₂O = 2 hidrógenos + 1 oxígeno"},
  {cat:"Compuestos",      q:"¿Cuál es la fórmula del SAL DE MESA?",                   opts:["NaCl","KCl","CaCO₃","HCl"],   ans:0, exp:"NaCl = Cloruro de sodio"},
  {cat:"Estados",         q:"¿A qué temperatura hierve el agua (°C)?",                opts:["50°","80°","100°","120°"],     ans:2, exp:"El agua hierve a 100°C a presión atmosférica normal"},
  {cat:"Reacciones",      q:"En NaOH, ¿Na es un...?",                                 opts:["Metal","No metal","Gas noble","Halógeno"], ans:0, exp:"Sodio (Na) está en el grupo 1: metales alcalinos"},
  {cat:"Tabla Periódica", q:"¿Qué elemento tiene símbolo Fe?",                        opts:["Flúor","Fósforo","Hierro","Francio"],      ans:2, exp:"Fe viene del latín FERRUM = hierro"},
  {cat:"Compuestos",      q:"¿Qué gas forma el CO₂?",                                 opts:["Metano","Dióxido de carbono","Ozono","Nitrógeno"], ans:1, exp:"C=carbono, O₂=dos oxígenos"},
  {cat:"Reacciones",      q:"¿Qué tipo de reacción produce luz y calor?",             opts:["Síntesis","Combustión","Descomposición","Neutralización"], ans:1, exp:"La combustión libera energía en forma de luz y calor"},
  {cat:"Tabla Periódica", q:"¿Cuál es el gas más abundante en la atmósfera?",         opts:["Oxígeno","Argón","Nitrógeno","CO₂"],       ans:2, exp:"El N₂ representa el 78% del aire"},
  {cat:"Tabla Periódica", q:"¿Cuál es el símbolo del SODIO?",                         opts:["So","Sd","Na","Sn"],           ans:2, exp:"Na del latín NATRIUM"},
  {cat:"Compuestos",      q:"¿Cuál es la fórmula del DIÓXIDO DE CARBONO?",            opts:["CO","CO₂","C₂O","CaO"],        ans:1, exp:"1 carbono + 2 oxígenos = CO₂"},
  {cat:"Estados",         q:"¿Cómo se llama el paso de sólido a gas sin pasar por líquido?", opts:["Fusión","Evaporación","Sublimación","Condensación"], ans:2, exp:"Sublimación: sólido → gas directamente"},
  {cat:"Tabla Periódica", q:"¿Cuántos elementos tiene la tabla periódica actual?",    opts:["98","112","118","124"],        ans:2, exp:"118 elementos confirmados hasta hoy"},
  {cat:"Reacciones",      q:"Ácido + Base produce...",                                opts:["Gas + Metal","Sal + Agua","Solo sal","Solo agua"], ans:1, exp:"Reacción de neutralización: Ácido + Base → Sal + H₂O"},
];

let questions, current, score, lives, combo, answered, total;

const screen   = document.getElementById('screen');
const scoreEl  = document.getElementById('score');
const levelEl  = document.getElementById('level');
const comboEl  = document.getElementById('combo');

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function showStart() {
  screen.innerHTML = `
    <div class="start-screen">
      <div class="pixel-char">🧪</div>
      <h3>QUIMICA QUEST</h3>
      <p> <h6>Demuestra tu conocimiento<br>de química básica </h6><br><br>
        <span class="cat-badge">Tabla Periódica</span>
        <span class="cat-badge">Compuestos</span>
        <span class="cat-badge">Estados</span>
        <span class="cat-badge">Reacciones</span><br><br>
        15 preguntas · 3 vidas · combo x
      </p>
      <button onclick="startGame()">▶ INICIAR JUEGO</button>
    </div>`;
}

function startGame() {
  questions = shuffle(QUESTIONS);
  current = 0; score = 0; lives = 3; combo = 1; answered = false;
  total = questions.length;
  updateHUD();
  showQuestion();
}

function updateHUD() {
  scoreEl.textContent = score;
  levelEl.textContent = Math.floor(current / 5) + 1;
  comboEl.textContent = 'x' + combo;
}

function showQuestion() {
  if (current >= total) { showWin(); return; }
  answered = false;
  const q = questions[current];
  const pct = Math.round((current / total) * 100);
  screen.innerHTML = `
    <div class="lives">${'♥'.repeat(lives)}${'♡'.repeat(3 - lives)}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-box">
      <div style="font-size:5px;color:#0088ff;margin-bottom:8px">[${q.cat}] · ${current + 1}/${total}</div>
      <div class="question-text">${q.q}</div>
    </div>
    <div class="options" id="opts">
      ${q.opts.map((o, i) => `<button class="opt-btn" onclick="pick(${i})">${String.fromCharCode(65 + i)}. ${o}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="nb" onclick="nextQ()">SIGUIENTE ▶</button>`;
}

function pick(i) {
  if (answered) return;
  answered = true;
  const q   = questions[current];
  const btns = document.querySelectorAll('.opt-btn');
  const fb   = document.getElementById('fb');
  const nb   = document.getElementById('nb');
  btns.forEach(b => b.onclick = null);

  if (i === q.ans) {
    btns[i].classList.add('correct');
    const pts = 10 * combo;
    score += pts;
    combo = Math.min(combo + 1, 5);
    fb.className = 'feedback ok';
    fb.innerHTML = `✓ CORRECTO! +${pts} PTS<br><span style="font-size:5px;color:#aaa">${q.exp}</span>`;
  } else {
    btns[i].classList.add('wrong');
    btns[q.ans].classList.add('correct');
    lives--;
    combo = 1;
    fb.className = 'feedback err';
    fb.innerHTML = `✗ INCORRECTO<br><span style="font-size:5px;color:#aaa">${q.exp}</span>`;
    if (lives <= 0) { setTimeout(() => showGameOver(), 900); updateHUD(); return; }
  }
  updateHUD();
  nb.classList.add('show');
}

function nextQ() { current++; showQuestion(); }

function showGameOver() {
  screen.innerHTML = `
    <div class="gameover">
      <div class="pixel-char">💀</div>
      <h2>GAME OVER</h2>
      <div class="final">PUNTUACION FINAL<br>${score} PTS<br>PREGUNTAS: ${current}/${total}</div>
      <button onclick="startGame()">↺ REINTENTAR</button>
    </div>`;
}

function showWin() {
  let medal = '🥉';
  if (score >= 120) medal = '🥇';
  else if (score >= 80) medal = '🥈';
  screen.innerHTML = `
    <div class="win">
      <div class="pixel-char">${medal}</div>
      <h2 style="color:#ffcc00">¡COMPLETADO!</h2>
      <div class="final" style="color:#ffcc00">PUNTUACION FINAL<br>${score} / 150 PTS<br>VIDAS RESTANTES: ${'♥'.repeat(lives)}</div>
      <button onclick="startGame()" style="background:#ffcc00;border-color:#ffcc00">↺ JUGAR DE NUEVO</button>
    </div>`;
}

showStart();
</script>
</body>
</html>
